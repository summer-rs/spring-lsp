name: Build VSCode Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false
      publish_marketplace:
        description: 'Publish to VSCode Marketplace'
        required: false
        type: boolean
        default: false
      publish_openvsx:
        description: 'Publish to Open VSX Registry'
        required: false
        type: boolean
        default: false

# 授予 GITHUB_TOKEN 写权限以创建 releases
permissions:
  contents: write  # 需要写权限来创建 releases 和上传资源

jobs:
  # 第一步：在各平台上构建语言服务器
  build-server:
    name: Build Server (${{ matrix.target }})
    strategy:
      fail-fast: false  # 即使一个平台失败，其他平台继续构建
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: summer-lsp-linux-x64
          # macOS Intel (x86_64) - 在 ARM64 Mac 上交叉编译
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: summer-lsp-darwin-x64
            cross_compile: true
          # macOS Apple Silicon (ARM64)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: summer-lsp-darwin-arm64
            cross_compile: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: summer-lsp-win32-x64.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30  # 添加超时限制，避免无限等待

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      # macOS 交叉编译需要额外的工具
      - name: Install cross-compilation tools (macOS x86_64)
        if: matrix.cross_compile == true
        run: |
          echo "Setting up cross-compilation for x86_64 on ARM64 Mac"
          # Rust 已经支持交叉编译，只需要添加 target
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.target }}
          cache-on-failure: true
      
      - name: Build language server
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifact
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/summer-lsp.exe artifact/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/summer-lsp artifact/${{ matrix.artifact }}
            chmod +x artifact/${{ matrix.artifact }}
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact/${{ matrix.artifact }}
          retention-days: 1

  # 第二步：打包 VSCode 扩展
  package-extension:
    name: Package Extension
    needs: build-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Download all server binaries
        uses: actions/download-artifact@v4
        with:
          path: vscode/bin-temp
      
      - name: Organize binaries
        run: |
          mkdir -p vscode/bin
          cd vscode/bin-temp
          # 将所有二进制文件移到 bin/ 目录
          find . -type f -exec mv {} ../bin/ \;
          cd ..
          rm -rf bin-temp
          # 设置执行权限
          chmod +x bin/summer-lsp-* || true
          # 显示文件列表
          echo "📦 Server binaries:"
          ls -lh bin/
      
      - name: Install dependencies
        run: |
          cd vscode
          if [ -f package-lock.json ]; then
            echo "📦 Using npm ci (with package-lock.json)"
            npm ci
          else
            echo "⚠️ package-lock.json not found, using npm install"
            npm install
          fi
      
      - name: Compile TypeScript with webpack
        run: |
          cd vscode
          echo "🔨 Compiling with webpack (production mode)..."
          npm run vscode:prepublish
      
      - name: Run verification
        run: |
          cd vscode
          npm run verify || echo "⚠️ Verification warnings (non-fatal)"
      
      - name: Package extension
        run: |
          cd vscode
          echo "📦 Packaging extension..."
          npx @vscode/vsce package --no-dependencies
          echo "✅ Extension packaged successfully"
          ls -lh *.vsix
      
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./vscode/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Extension version: $VERSION"
      
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode/*.vsix
          retention-days: 30
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: vscode/*.vsix
          draft: true
          generate_release_notes: true
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Summer LSP VSCode Extension v${{ steps.version.outputs.version }}
            
            ### Installation
            
            Download the `.vsix` file and install:
            ```bash
            code --install-extension summer-rs-${{ steps.version.outputs.version }}.vsix
            ```
            
            Or install from VSCode Marketplace (coming soon).
            
            ### What's Included
            
            - ✅ Language server binaries for all platforms (Linux, macOS Intel/ARM, Windows)
            - ✅ Application management and debugging
            - ✅ TOML configuration support
            - ✅ Real-time application insights
            
            ### Supported Platforms
            
            - Linux x64
            - macOS x64 (Intel)
            - macOS ARM64 (Apple Silicon)
            - Windows x64
            
            See [CHANGELOG.md](https://github.com/summer-rs/summer-lsp/blob/main/vscode/CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to VSCode Marketplace
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_marketplace == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd vscode
          if [ -z "$VSCE_PAT" ]; then
            echo "⚠️ VSCE_PAT secret not set, skipping marketplace publish"
            exit 0
          fi
          echo "🚀 Publishing to VSCode Marketplace..."
          npx @vscode/vsce publish --packagePath *.vsix -p $VSCE_PAT
          echo "✅ Published to VSCode Marketplace successfully"
        continue-on-error: false
      
      - name: Publish to Open VSX Registry
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_openvsx == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          cd vscode
          if [ -z "$OVSX_PAT" ]; then
            echo "⚠️ OVSX_PAT secret not set, skipping Open VSX publish"
            exit 0
          fi
          echo "🚀 Publishing to Open VSX Registry..."
          npx ovsx publish *.vsix -p $OVSX_PAT
          echo "✅ Published to Open VSX Registry successfully"
        continue-on-error: true
